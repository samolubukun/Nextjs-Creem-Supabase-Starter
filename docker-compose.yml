version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CREEM_API_KEY=${CREEM_API_KEY}
      - CREEM_WEBHOOK_SECRET=${CREEM_WEBHOOK_SECRET}
      - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY}
      - NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_PROJECT_ID=${POSTHOG_PROJECT_ID}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_CREEM_STARTER_PRODUCT_ID=${NEXT_PUBLIC_CREEM_STARTER_PRODUCT_ID}
      - NEXT_PUBLIC_CREEM_PRO_PRODUCT_ID=${NEXT_PUBLIC_CREEM_PRO_PRODUCT_ID}
      - NEXT_PUBLIC_CREEM_ENTERPRISE_PRODUCT_ID=${NEXT_PUBLIC_CREEM_ENTERPRISE_PRODUCT_ID}
      - NEXT_PUBLIC_CREEM_PRO_MAX_PRODUCT_ID=${NEXT_PUBLIC_CREEM_PRO_MAX_PRODUCT_ID}
      - S3_PROVIDER=${S3_PROVIDER}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}
      - S3_KEY_PREFIX=${S3_KEY_PREFIX}
      - S3_ALLOWED_MIME_TYPES=${S3_ALLOWED_MIME_TYPES}
      - S3_MAX_UPLOAD_BYTES=${S3_MAX_UPLOAD_BYTES}
      - S3_SIGNED_URL_TTL_SECONDS=${S3_SIGNED_URL_TTL_SECONDS}
      - S3_DOWNLOAD_URL_TTL_SECONDS=${S3_DOWNLOAD_URL_TTL_SECONDS}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LOG_LEVEL=${LOG_LEVEL}
      - BETTERSTACK_SOURCE_TOKEN=${BETTERSTACK_SOURCE_TOKEN}
      - BETTERSTACK_INGESTING_HOST=${BETTERSTACK_INGESTING_HOST}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  workers:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run workers
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CREEM_API_KEY=${CREEM_API_KEY}
      - CREEM_WEBHOOK_SECRET=${CREEM_WEBHOOK_SECRET}
      - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY}
      - NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_PROJECT_ID=${POSTHOG_PROJECT_ID}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_CREEM_STARTER_PRODUCT_ID=${NEXT_PUBLIC_CREEM_STARTER_PRODUCT_ID}
      - NEXT_PUBLIC_CREEM_PRO_PRODUCT_ID=${NEXT_PUBLIC_CREEM_PRO_PRODUCT_ID}
      - NEXT_PUBLIC_CREEM_ENTERPRISE_PRODUCT_ID=${NEXT_PUBLIC_CREEM_ENTERPRISE_PRODUCT_ID}
      - NEXT_PUBLIC_CREEM_PRO_MAX_PRODUCT_ID=${NEXT_PUBLIC_CREEM_PRO_MAX_PRODUCT_ID}
      - S3_PROVIDER=${S3_PROVIDER}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}
      - S3_KEY_PREFIX=${S3_KEY_PREFIX}
      - S3_ALLOWED_MIME_TYPES=${S3_ALLOWED_MIME_TYPES}
      - S3_MAX_UPLOAD_BYTES=${S3_MAX_UPLOAD_BYTES}
      - S3_SIGNED_URL_TTL_SECONDS=${S3_SIGNED_URL_TTL_SECONDS}
      - S3_DOWNLOAD_URL_TTL_SECONDS=${S3_DOWNLOAD_URL_TTL_SECONDS}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LOG_LEVEL=${LOG_LEVEL}
      - BETTERSTACK_SOURCE_TOKEN=${BETTERSTACK_SOURCE_TOKEN}
      - BETTERSTACK_INGESTING_HOST=${BETTERSTACK_INGESTING_HOST}
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data: